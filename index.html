<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>😺 Flappy Cat Universe 😺</title>

<style>
    body{
        margin:0;
        overflow:hidden;
        background:#87d7ff;
        font-family:Arial, sans-serif;
    }

    canvas{
        display:block;
        margin:auto;
        background:linear-gradient(#8be9ff,#d8f8ff);
    }

    #info{
        position:absolute;
        top:10px;
        left:10px;
        font-size:24px;
        color:white;
        text-shadow:2px 2px 4px black;
        z-index:2;
    }

    #start{
        position:absolute;
        width:100%;
        top:40%;
        text-align:center;
        font-size:40px;
        color:white;
        text-shadow:2px 2px 8px black;
        z-index:2;
    }
</style>
</head>

<body>

<div id="info"></div>
<div id="start">
😺 CAT UNIVERSE 😺<br><br>
Click or Press SPACE to Fly<br>
Catch 🐟 for bonus points!<br>
Avoid 🌵 cat trees and 🐍 snakes!
</div>

<canvas id="game" width="500" height="700"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const info = document.getElementById("info");
const startText = document.getElementById("start");

let started = false;
let gameOver = false;

const catFaces = {
    normal:"😺",
    happy:"😻",
    scared:"🙀",
    sad:"😿",
    demon:"👿"
};

const player = {
    x:120,
    y:300,
    velocity:0,
    gravity:0.55,
    jump:-9,
    size:45,
    face:"😺",
    hits:0,
    score:0
};

let pipes = [];
let fishes = [];
let snakes = [];
let frame = 0;

function resetGame(){
    pipes = [];
    fishes = [];
    snakes = [];
    frame = 0;

    player.y = 300;
    player.velocity = 0;
    player.face = "😺";
    player.hits = 0;
    player.score = 0;

    gameOver = false;
}

function drawBackground(){

    for(let i=0;i<20;i++){
        ctx.font = "25px serif";
        ctx.fillText("🐾", (i*140 + frame*0.3)%700 -100, (i*90)%700);
    }

    ctx.font = "70px serif";
    ctx.fillText("☁️", 50, 100);
    ctx.fillText("☁️", 350, 170);

    ctx.font = "60px serif";
    ctx.fillText("🏠", 40, 650);
    ctx.fillText("🧶", 200, 650);
    ctx.fillText("🛏️", 370, 650);
}

function drawPlayer(){
    ctx.font = `${player.size}px serif`;
    ctx.fillText(player.face, player.x, player.y);
}

function createPipe(){

    let gap = 190;
    let topHeight = Math.random()*250 + 80;

    pipes.push({
        x:canvas.width,
        top:topHeight,
        bottom:topHeight + gap,
        width:80,
        passed:false
    });

    if(Math.random() < 0.7){
        fishes.push({
            x:canvas.width + 40,
            y:topHeight + gap/2,
            size:30
        });
    }

    if(Math.random() < 0.35){
        snakes.push({
            x:canvas.width + 120,
            y:Math.random()*500 + 80,
            size:35
        });
    }
}

function drawPipes(){

    pipes.forEach(pipe=>{

        ctx.font = "50px serif";

        for(let y=0; y<pipe.top; y+=45){
            ctx.fillText("🌵", pipe.x, y);
        }

        for(let y=pipe.bottom; y<canvas.height; y+=45){
            ctx.fillText("🪴", pipe.x, y);
        }

        pipe.x -= 3;

        let near =
            player.x + 80 > pipe.x &&
            player.x < pipe.x + pipe.width;

        if(near){
            player.face = "🙀";
        }

        let hit =
            player.x + player.size > pipe.x &&
            player.x < pipe.x + pipe.width &&
            (
                player.y < pipe.top ||
                player.y + player.size > pipe.bottom
            );

        if(hit){

            player.hits++;

            if(player.hits >= 3){
                player.face = "👿";
            }else{
                player.face = "😿";
            }

            pipe.x -= 25;
        }

        if(!pipe.passed && pipe.x + pipe.width < player.x){
            player.score++;
            pipe.passed = true;
            player.face = "😻";
        }

    });

    pipes = pipes.filter(p=>p.x > -100);
}

function drawFishes(){

    fishes.forEach((fish,index)=>{

        fish.x -= 3;

        ctx.font = "30px serif";
        ctx.fillText("🐟", fish.x, fish.y);

        let caught =
            player.x < fish.x + 20 &&
            player.x + player.size > fish.x &&
            player.y < fish.y + 20 &&
            player.y + player.size > fish.y;

        if(caught){
            player.score += 5;
            player.face = "😹";
            fishes.splice(index,1);
        }

    });

}

function drawSnakes(){

    snakes.forEach((snake,index)=>{

        snake.x -= 4;

        ctx.font = "35px serif";
        ctx.fillText("🐍", snake.x, snake.y);

        let hit =
            player.x < snake.x + 25 &&
            player.x + player.size > snake.x &&
            player.y < snake.y + 25 &&
            player.y + player.size > snake.y;

        if(hit){
            player.face = "👹";
            gameOver = true;
        }

    });

}

function update(){

    if(!started) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawBackground();

    player.velocity += player.gravity;
    player.y += player.velocity;

    if(frame % 110 === 0){
        createPipe();
    }

    drawPipes();
    drawFishes();
    drawSnakes();
    drawPlayer();

    if(player.y > canvas.height || player.y < 0){
        gameOver = true;
    }

    info.innerHTML =
        `Score: ${player.score} 🐟<br>
        Hits: ${player.hits}/3`;

    frame++;

    if(gameOver){

        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.font = "60px serif";
        ctx.fillText(player.face, 210, 260);

        ctx.font = "35px Arial";
        ctx.fillStyle = "white";
        ctx.fillText("GAME OVER", 145, 340);

        ctx.font = "25px Arial";
        ctx.fillText("Click to restart", 160, 390);

        return;
    }

    requestAnimationFrame(update);
}

function jump(){

    if(!started){
        started = true;
        startText.style.display = "none";
        update();
    }

    if(gameOver){
        resetGame();
        update();
        return;
    }

    player.velocity = player.jump;
    player.face = "😸";
}

document.addEventListener("keydown",(e)=>{
    if(e.code === "Space"){
        jump();
    }
});

document.addEventListener("click",jump);

drawBackground();
drawPlayer();

</script>

</body>
</html>
